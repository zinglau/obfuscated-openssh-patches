name: Build openssh-portable-win32

on:
  push:
    branches: [ debug-actions ]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to build (leave empty for latest)'
        required: false
        default:

jobs:
  patch-and-build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86, x64, ARM, ARM64]
        config: [Release, Debug]

    steps:
      - name: Checkout patches
        uses: actions/checkout@v4
        with:
          path: patches

      - name: Checkout upstream
        uses: actions/checkout@v4
        with:
          repository: "PowerShell/openssh-portable"
          ref: ${{ github.event.inputs.tag_name != '' && github.event.inputs.tag_name || 'v9.8.3.0' }}
          path: openssh-portable
          fetch-depth: 1

      - name: Apply Patch
        run: |
          $ver = "${{ github.event.inputs.patch != '' && github.event.inputs.patch || '9.8' }}"
          $patchFile = "patches/windows/$ver.diff"
          if (Test-Path $patchFile) {
              echo "Applying patch: $patchFile"
              cd openssh-portable
              cmd /c "patch -p1 < ../$patchFile"
          } else {
              echo "$patchFile not found! Quitting..."
              exit 1
          }

      - name: Checkout vcpkg
        uses: actions/checkout@v4
        with:
          repository: "Microsoft/Vcpkg"
          path: vcpkg
          fetch-depth: 1

      - name: Bootstrap and integrate vcpkg
        run: |
          cd vcpkg
          .\bootstrap-vcpkg.bat
          .\vcpkg.exe integrate install

      - name: Build and Package
        run: |
          cd openssh-portable
          ipmo .\contrib\win32\openssh\OpenSSHBuildHelper.psm1 -Force
          Start-OpenSSHBuild -Configuration ${{ matrix.config }} -NativeHostArch ${{ matrix.arch }}

      - name: Package to Zip
        run: |
          $arch = if ("${{ matrix.arch }}" -eq "x86") { "Win32" } else { "${{ matrix.arch }}" }
          $zipName = "ObfuscatedOpenSSH_Windows_${{ matrix.arch }}_${{ matrix.config }}.zip"
          $targetPath = ".\openssh-portable\bin\$arch\${{ matrix.config }}\"
          Compress-Archive -Path "$targetPath*" -DestinationPath $zipName

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Build-${{ matrix.arch }}-${{ matrix.config }}
          path: "*.zip"
